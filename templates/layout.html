<!DOCTYPE html>
<html lang="en"><head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <script
            src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
            rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet" />
        <script id="tailwind-config">
            tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                colors: {
                    "primary": "#6B8E6B", // Muted Sage Green
                    "secondary": "#A8B5A2", // Lighter Sage
                    "accent": "#E5E1D8", // Natural Beige
                    "warm-gray": "#4A4A4A",
                    "background-light": "#F9F8F6", // Natural Off-white/Beige
                    "background-dark": "#1F2421",
                },
                fontFamily: {
                    "display": ["Inter", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
                },
            },
            }
    </script>
        <style type="text/tailwindcss">
            :root {
                --sage-muted: #6B8E6B;
                --beige-accent: #E5E1D8;
                --warm-gray: #706F6C;
            }
            .magazine-grid {
                display: grid;
                grid-template-columns: repeat(12, 1fr);
                gap: 2rem;
            }
            .editorial-text {
                line-height: 1.6;
                letter-spacing: -0.01em;
            }
    </style>
        <title>Holistic Wellness Sanctuary | Nurturing Life</title>
    </head>
    {% block content%}
        <header class="flex items-center justify-between border-b border-solid border-accent/50 dark:border-slate-800 px-8 md:px-20 py-8 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-3 text-primary">
                <div class="size-6">
                    <span
                        class="material-symbols-outlined text-2xl">spa</span>
                </div>
                <h2
                    class="text-warm-gray dark:text-slate-100 text-lg font-semibold tracking-[0.2em] uppercase">Sanctuary</h2>
            </div>
            <div class="flex flex-1 justify-end gap-12 items-center">
                <nav class="hidden lg:flex items-center gap-10">
                    <a
                        class="text-warm-gray/70 dark:text-slate-300 text-xs font-bold uppercase tracking-widest hover:text-primary transition-colors"
                        href="#">The Vision</a>
                    <a
                        class="text-warm-gray/70 dark:text-slate-300 text-xs font-bold uppercase tracking-widest hover:text-primary transition-colors"
                        href="#">Rituals</a>
                    <a
                        class="text-warm-gray/70 dark:text-slate-300 text-xs font-bold uppercase tracking-widest hover:text-primary transition-colors"
                        href="#">Journeys</a>
                    <a
                        class="text-warm-gray/70 dark:text-slate-300 text-xs font-bold uppercase tracking-widest hover:text-primary transition-colors"
                        href="#">Connection</a>
                </nav>
                <button
                    class="flex min-w-[140px] cursor-pointer items-center justify-center border border-primary text-primary px-6 py-2.5 text-[10px] font-bold uppercase tracking-[0.2em] transition-all hover:bg-primary hover:text-white">Book
                    Consultation</button>
            </div>
        </header>
    {% endblock %}
</html>
